<svg width="1200" height="80" viewBox="0 0 1200 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#7c3aed;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#7c3aed;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f0c29;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9d5ff"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Center ambient glow -->
  <circle cx="600" cy="40" r="60" fill="url(#centerGlow)">
    <animate attributeName="r" values="50;65;50" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Main beam line -->
  <rect x="0" y="39" width="1200" height="1.5" fill="url(#beamGrad)"/>

  <!-- Left circuit accent -->
  <g opacity="0.55" stroke="#a78bfa" stroke-width="1" fill="none">
    <path d="M 380 40 L 440 40 L 450 30 L 470 30"/>
    <path d="M 410 40 L 425 50 L 460 50"/>
  </g>
  <circle cx="470" cy="30" r="2" fill="#c084fc"/>
  <circle cx="460" cy="50" r="2" fill="#c084fc"/>

  <!-- Right circuit accent -->
  <g opacity="0.55" stroke="#a78bfa" stroke-width="1" fill="none">
    <path d="M 820 40 L 760 40 L 750 30 L 730 30"/>
    <path d="M 790 40 L 775 50 L 740 50"/>
  </g>
  <circle cx="730" cy="30" r="2" fill="#c084fc"/>
  <circle cx="740" cy="50" r="2" fill="#c084fc"/>

  <!-- Traveling pulse dots along the beam -->
  <circle cy="40" r="3" fill="#e9d5ff" filter="url(#softGlow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 0,0 L 540,0"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cy="40" r="3" fill="#e9d5ff" filter="url(#softGlow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 1200,0 L 660,0"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Outer small diamonds -->
  <rect x="556" y="26" width="10" height="10" rx="2" fill="#7c3aed" opacity="0.7" transform="rotate(45 561 31)"/>
  <rect x="634" y="26" width="10" height="10" rx="2" fill="#7c3aed" opacity="0.7" transform="rotate(45 639 31)"/>

  <!-- Center rotating diamond -->
  <g transform="translate(600 40)">
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="url(#diamondGrad)" filter="url(#softGlow)" transform="rotate(45)">
      <animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-5" y="-5" width="10" height="10" rx="1.5" fill="#ffffff" opacity="0.9" transform="rotate(45)"/>
  </g>

  <!-- Tiny floating sparkles -->
  <circle cx="150" cy="25" r="1.3" fill="#c084fc" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="55" r="1.3" fill="#c084fc" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="55" r="1" fill="#e9d5ff" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="920" cy="22" r="1" fill="#e9d5ff" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
