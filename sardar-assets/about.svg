  <text x="339" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c4b5fd">🏗️ Clean Architecture</text>

  <rect x="448" y="244" width="200" height="32" rx="16" fill="#2d1b69" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="548" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#c4b5fd">⚡ Performance Optim.</text>

