<svg width="1100" height="190" viewBox="0 0 1100 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1535"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="190" rx="18" fill="url(#cardBg)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="0" y="0" width="5" height="190" rx="2.5" fill="url(#accentLine)"/>

  <text x="44" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="800" fill="#c4b5fd">🤝 Let's Connect</text>
  <rect x="44" y="70" width="200" height="2" fill="#a78bfa" opacity="0.4"/>

  <!-- LinkedIn -->
  <rect x="44" y="96" width="240" height="60" rx="10" fill="#0a1f3d" stroke="#0A66C2" stroke-width="0.8" stroke-opacity="0.65"/>
  <text x="164" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#7dabf0">in  LinkedIn</text>

  <!-- Upwork -->
  <rect x="300" y="96" width="220" height="60" rx="10" fill="#0a2615" stroke="#6FDA44" stroke-width="0.8" stroke-opacity="0.65"/>
  <text x="410" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#86efac">Upwork</text>

  <!-- Gmail -->
  <rect x="536" y="96" width="220" height="60" rx="10" fill="#330d0a" stroke="#EA4335" stroke-width="0.8" stroke-opacity="0.65"/>
  <text x="646" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#fca5a5">✉ Gmail</text>

  <!-- GitHub -->
  <rect x="772" y="96" width="220" height="60" rx="10" fill="#111111" stroke="#ffffff" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="882" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">GitHub</text>
</svg>
