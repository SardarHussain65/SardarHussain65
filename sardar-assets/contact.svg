<svg width="1100" height="160" viewBox="0 0 1100 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1535"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="160" rx="16" fill="url(#cardBg)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="0" y="0" width="4" height="160" rx="2" fill="url(#accentLine)"/>

  <text x="40" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#a78bfa">🤝 Let's Connect</text>
  <rect x="40" y="56" width="180" height="1" fill="#a78bfa" opacity="0.3"/>

  <!-- LinkedIn -->
  <rect x="40" y="80" width="230" height="50" rx="8" fill="#0a1f3d" stroke="#0A66C2" stroke-width="0.6" stroke-opacity="0.6"/>
  <text x="155" y="111" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#7dabf0">in  LinkedIn</text>

  <!-- Upwork -->
  <rect x="288" y="80" width="210" height="50" rx="8" fill="#0a2615" stroke="#6FDA44" stroke-width="0.6" stroke-opacity="0.6"/>
  <text x="393" y="111" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#86efac">Upwork</text>

  <!-- Gmail -->
  <rect x="516" y="80" width="210" height="50" rx="8" fill="#330d0a" stroke="#EA4335" stroke-width="0.6" stroke-opacity="0.6"/>
  <text x="621" y="111" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#fca5a5">✉ Gmail</text>

  <!-- GitHub -->
  <rect x="744" y="80" width="210" height="50" rx="8" fill="#111111" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.25"/>
  <text x="849" y="111" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">GitHub</text>
</svg>
